{% extends "base.html" %}
{% block content %}

<style>
    .auth-wrap {
        max-width: 440px;
        margin: 20px auto 60px;
    }

    /* ─── CARD ─── */
    .auth-card {
        background: white;
        border-radius: 20px;
        border: 1px solid rgba(0,0,0,0.06);
        box-shadow: 0 4px 24px rgba(0,0,0,0.07);
        overflow: hidden;
    }

    /* Top accent */
    .auth-band {
        height: 4px;
        background: linear-gradient(90deg, #0ea5e9, #10b981);
    }

    .auth-body { padding: 36px 36px 32px; }

    /* Brand mark */
    .auth-brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        margin-bottom: 28px;
        text-align: center;
    }

    .auth-icon {
        width: 52px; height: 52px;
        background: linear-gradient(135deg, #0ea5e9, #0284c7);
        border-radius: 14px;
        display: flex; align-items: center; justify-content: center;
        font-size: 22px;
        color: white;
        box-shadow: 0 6px 20px rgba(14,165,233,0.3);
    }

    .auth-title {
        font-size: 22px;
        font-weight: 800;
        color: #0f172a;
        letter-spacing: -0.02em;
        margin: 0;
    }

    .auth-subtitle {
        font-size: 13px;
        color: #94a3b8;
        margin: 2px 0 0;
    }

    /* ─── FIELDS ─── */
    .field-wrap {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 16px;
    }

    .field-label {
        font-size: 12px;
        font-weight: 700;
        color: #475569;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .field-label i { color: #0ea5e9; font-size: 12px; }

    .input-wrap {
        position: relative;
    }

    .input-icon {
        position: absolute;
        left: 13px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 15px;
        color: #94a3b8;
        pointer-events: none;
        transition: color 0.15s;
    }

    .form-input {
        width: 100%;
        background: #f8fafc;
        border: 1.5px solid #e2e8f0;
        border-radius: 10px;
        padding: 11px 14px 11px 40px;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 13.5px;
        color: #0f172a;
        outline: none;
        transition: all 0.15s;
    }

    .form-input:focus {
        border-color: #0ea5e9;
        box-shadow: 0 0 0 3px rgba(14,165,233,0.12);
        background: white;
    }

    .form-input:focus + .input-icon,
    .input-wrap:focus-within .input-icon {
        color: #0ea5e9;
    }

    .form-input::placeholder { color: #94a3b8; }

    /* Password toggle */
    .pwd-toggle {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: #94a3b8;
        font-size: 15px;
        padding: 4px;
        transition: color 0.15s;
        line-height: 1;
    }

    .pwd-toggle:hover { color: #475569; }

    /* ─── FORGOT LINK ─── */
    .forgot-row {
        display: flex;
        justify-content: flex-end;
        margin-top: -8px;
        margin-bottom: 20px;
    }

    .forgot-link {
        font-size: 12px;
        font-weight: 600;
        color: #0ea5e9;
        text-decoration: none;
        transition: color 0.15s;
    }

    .forgot-link:hover { color: #0284c7; }

    /* ─── SUBMIT ─── */
    .btn-login {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        padding: 13px;
        border-radius: 10px;
        background: #0ea5e9;
        color: white;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 14.5px;
        font-weight: 700;
        border: none;
        cursor: pointer;
        transition: all 0.18s;
        box-shadow: 0 4px 14px rgba(14,165,233,0.28);
        margin-bottom: 20px;
    }

    .btn-login:hover {
        background: #0284c7;
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(14,165,233,0.36);
    }

    /* ─── DIVIDER ─── */
    .auth-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
    }

    .auth-divider::before,
    .auth-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: #e2e8f0;
    }

    .auth-divider span {
        font-size: 11.5px;
        font-weight: 600;
        color: #94a3b8;
        white-space: nowrap;
    }

    /* ─── REGISTER LINK ─── */
    .auth-footer {
        text-align: center;
        font-size: 13.5px;
        color: #64748b;
        padding: 18px 36px;
        border-top: 1px solid rgba(0,0,0,0.06);
        background: #fafbfc;
    }

    .auth-footer a {
        color: #0ea5e9;
        font-weight: 700;
        text-decoration: none;
        transition: color 0.15s;
    }

    .auth-footer a:hover { color: #0284c7; }

    /* ─── TRUST ROW ─── */
    .trust-row {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 20px;
        flex-wrap: wrap;
    }

    .trust-item {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 11.5px;
        color: #94a3b8;
        font-weight: 500;
    }

    .trust-item i { color: #22c55e; font-size: 13px; }

    /* Fade in */
    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .auth-card { animation: fadeUp 0.35s ease both; }
</style>

<div class="auth-wrap">
    <div class="auth-card">

        <div class="auth-band"></div>

        <div class="auth-body">

            <!-- Brand -->
            <div class="auth-brand">
                <div class="auth-icon"><i class="bi bi-heart-pulse-fill"></i></div>
                <div>
                    <div class="auth-title">Welcome back</div>
                    <div class="auth-subtitle">Sign in to your DawaiTrack account</div>
                </div>
            </div>

            <!-- Form -->
            <form method="POST">

                <div class="field-wrap">
                    <label class="field-label">
                        <i class="bi bi-envelope"></i> Email Address
                    </label>
                    <div class="input-wrap">
                        <input type="email" name="email" class="form-input"
                               placeholder="you@example.com" required autocomplete="email">
                        <i class="bi bi-envelope input-icon"></i>
                    </div>
                </div>

                <div class="field-wrap">
                    <label class="field-label">
                        <i class="bi bi-lock"></i> Password
                    </label>
                    <div class="input-wrap">
                        <input type="password" name="password" class="form-input"
                               id="passwordInput"
                               placeholder="Enter your password" required autocomplete="current-password">
                        <i class="bi bi-lock input-icon"></i>
                        <button type="button" class="pwd-toggle" id="pwdToggle" title="Show password">
                            <i class="bi bi-eye" id="pwdIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="forgot-row">
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-login">
                    <i class="bi bi-box-arrow-in-right" style="font-size:15px;"></i>
                    Sign In
                </button>

            </form>

            <!-- Trust -->
            <div class="trust-row">
                <div class="trust-item">
                    <i class="bi bi-shield-check-fill"></i> Secure login
                </div>
                <div class="trust-item">
                    <i class="bi bi-lock-fill"></i> 256-bit encrypted
                </div>
                <div class="trust-item">
                    <i class="bi bi-patch-check-fill"></i> Verified platform
                </div>
            </div>

        </div>

        <div class="auth-footer">
            Don't have an account?
            <a href="{{ url_for('auth.register') }}">Create one free</a>
        </div>

    </div>
</div>

<script>
    const pwdInput  = document.getElementById('passwordInput');
    const pwdToggle = document.getElementById('pwdToggle');
    const pwdIcon   = document.getElementById('pwdIcon');

    pwdToggle.addEventListener('click', () => {
        const isHidden = pwdInput.type === 'password';
        pwdInput.type  = isHidden ? 'text' : 'password';
        pwdIcon.className = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';
    });
</script>

{% endblock %}
